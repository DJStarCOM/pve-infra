apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    chart: litellm-helm
    repoURL: docker.litellm.ai/berriai
    targetRevision: "0.1.2"
    helm:
      valuesObject:
        masterkeySecretName: litellm-secrets
        masterkeySecretKey: LITELLM_MASTER_KEY
        ingress:
          enabled: true
          className: traefik
          hosts:
            - host: llm.webtechforge.dev
              paths:
                - path: /
                  pathType: Prefix
        resources:
          requests:
            cpu: 256m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        environmentSecrets:
          - litellm-secrets
        envVars:
          LANGFUSE_HOST: "http://langfuse-web.platform.svc.cluster.local:3000"
        postgresql:
          enabled: true
          architecture: standalone
          image:
            registry: docker.io
            repository: bitnami/postgresql
            tag: "16-debian-12"
          primary:
            persistence:
              size: 2Gi
            resources:
              requests:
                cpu: 128m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
        proxy_config:
          model_list:
            - model_name: "claude-opus-4.6"
              litellm_params:
                model: "bedrock/anthropic.claude-opus-4-6-v1"
            - model_name: "claude-opus-4.5"
              litellm_params:
                model: "bedrock/anthropic.claude-opus-4-5-20251101-v1:0"
            - model_name: "claude-sonnet-4.6"
              litellm_params:
                model: "bedrock/anthropic.claude-sonnet-4-6"
            - model_name: "claude-sonnet-4.5"
              litellm_params:
                model: "bedrock/anthropic.claude-sonnet-4-5-20250929-v1:0"
            - model_name: "claude-sonnet-4"
              litellm_params:
                model: "bedrock/anthropic.claude-sonnet-4-20250514-v1:0"
            - model_name: "claude-haiku-4.5"
              litellm_params:
                model: "bedrock/anthropic.claude-haiku-4-5-20251001-v1:0"
            - model_name: "nova-pro"
              litellm_params:
                model: "bedrock/amazon.nova-pro-v1:0"
            - model_name: "nova-lite"
              litellm_params:
                model: "bedrock/amazon.nova-lite-v1:0"
            - model_name: "nova-micro"
              litellm_params:
                model: "bedrock/amazon.nova-micro-v1:0"
            - model_name: "openrouter/*"
              litellm_params:
                model: "openrouter/*"
                api_key: "os.environ/OPENROUTER_API_KEY"
          litellm_settings:
            success_callback:
              - "langfuse"
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  ignoreDifferences:
    - group: networking.k8s.io
      kind: Ingress
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
