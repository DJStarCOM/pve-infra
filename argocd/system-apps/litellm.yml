apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  source:
    chart: litellm-helm
    repoURL: docker.litellm.ai/berriai
    targetRevision: "0.1.2"
    helm:
      valuesObject:
        masterkeySecretName: litellm-secrets
        masterkeySecretKey: LITELLM_MASTER_KEY
        ingress:
          enabled: true
          className: traefik
          hosts:
            - host: llm.webtechforge.dev
              paths:
                - path: /
                  pathType: Prefix
        resources:
          requests:
            cpu: 256m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        environmentSecrets:
          - litellm-secrets
        envVars:
          LANGFUSE_HOST: "http://langfuse-web.platform.svc.cluster.local:3000"
        postgresql:
          enabled: true
          architecture: standalone
          image:
            registry: docker.io
            repository: bitnami/postgresql
            tag: "16-debian-12"
          primary:
            persistence:
              size: 2Gi
            resources:
              requests:
                cpu: 128m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
        proxy_config:
          model_list:
            # Bedrock eu-central-1 (модели с включённым on-demand доступом)
            - model_name: "claude-3.5-sonnet"
              litellm_params:
                model: "bedrock/anthropic.claude-3-5-sonnet-20240620-v1:0"
            - model_name: "claude-3-haiku"
              litellm_params:
                model: "bedrock/anthropic.claude-3-haiku-20240307-v1:0"
            # OpenRouter (все остальные модели)
            - model_name: "openrouter/*"
              litellm_params:
                model: "openrouter/*"
                api_key: "os.environ/OPENROUTER_API_KEY"
          litellm_settings:
            success_callback:
              - "langfuse"
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  ignoreDifferences:
    - group: networking.k8s.io
      kind: Ingress
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
