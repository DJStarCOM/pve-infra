---
# Установка дополнительных компонентов в k3s-кластер:
# - cert-manager (автоматические TLS-сертификаты через Let's Encrypt)
# - kube-prometheus-stack (мониторинг: Prometheus + Grafana + Alertmanager)
#
# Запуск: ansible-playbook ansible/playbooks/setup-k3s-extras.yml
- name: Установить дополнительные компоненты в k3s
  hosts: k3s_master
  become: true
  gather_facts: false

  vars:
    certmanager_version: "v1.17.2"
    kube_prometheus_stack_chart_version: "69.8.0"
    letsencrypt_email: "starcomdj@gmail.com"

  tasks:
    # === cert-manager ===

    - name: "cert-manager: Создать namespace"
      ansible.builtin.shell: |
        k3s kubectl create namespace cert-manager --dry-run=client -o yaml | k3s kubectl apply -f -

    - name: "cert-manager: Установить через HelmChart CRD"
      ansible.builtin.shell: |
        k3s kubectl apply -f - <<'EOF'
        apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: cert-manager
          namespace: kube-system
        spec:
          repo: https://charts.jetstack.io
          chart: cert-manager
          version: "{{ certmanager_version }}"
          targetNamespace: cert-manager
          valuesContent: |-
            crds:
              enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
            webhook:
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
            cainjector:
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 256Mi
        EOF
      changed_when: true

    - name: "cert-manager: Дождаться готовности controller"
      ansible.builtin.shell: |
        k3s kubectl -n cert-manager rollout status deploy/cert-manager --timeout=180s
      retries: 6
      delay: 15
      register: certmanager_ready
      until: certmanager_ready.rc == 0

    - name: "cert-manager: Дождаться готовности webhook"
      ansible.builtin.shell: |
        k3s kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=180s
      retries: 6
      delay: 10
      register: certmanager_webhook_ready
      until: certmanager_webhook_ready.rc == 0

    - name: "cert-manager: Создать ClusterIssuer (staging)"
      ansible.builtin.shell: |
        k3s kubectl apply -f - <<'EOF'
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: letsencrypt-staging
        spec:
          acme:
            server: https://acme-staging-v02.api.letsencrypt.org/directory
            email: "{{ letsencrypt_email }}"
            privateKeySecretRef:
              name: letsencrypt-staging-key
            solvers:
              - http01:
                  ingress:
                    ingressClassName: traefik
        EOF
      retries: 5
      delay: 15
      register: staging_issuer
      until: staging_issuer.rc == 0

    - name: "cert-manager: Создать ClusterIssuer (production)"
      ansible.builtin.shell: |
        k3s kubectl apply -f - <<'EOF'
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: letsencrypt-production
        spec:
          acme:
            server: https://acme-v02.api.letsencrypt.org/directory
            email: "{{ letsencrypt_email }}"
            privateKeySecretRef:
              name: letsencrypt-production-key
            solvers:
              - http01:
                  ingress:
                    ingressClassName: traefik
        EOF
      retries: 5
      delay: 15
      register: prod_issuer
      until: prod_issuer.rc == 0

    # === kube-prometheus-stack ===

    - name: "Monitoring: Создать namespace"
      ansible.builtin.shell: |
        k3s kubectl create namespace monitoring --dry-run=client -o yaml | k3s kubectl apply -f -

    - name: "Monitoring: Установить kube-prometheus-stack через HelmChart CRD"
      ansible.builtin.shell: |
        k3s kubectl apply -f - <<'EOF'
        apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: kube-prometheus-stack
          namespace: kube-system
        spec:
          repo: https://prometheus-community.github.io/helm-charts
          chart: kube-prometheus-stack
          version: "{{ kube_prometheus_stack_chart_version }}"
          targetNamespace: monitoring
          valuesContent: |-
            prometheus:
              prometheusSpec:
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 200m
                    memory: 512Mi
                retention: 7d
                storageSpec:
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 10Gi
            grafana:
              adminPassword: admin
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              persistence:
                enabled: true
                size: 2Gi
            alertmanager:
              alertmanagerSpec:
                resources:
                  requests:
                    cpu: 25m
                    memory: 32Mi
                  limits:
                    cpu: 50m
                    memory: 64Mi
                storage:
                  volumeClaimTemplate:
                    spec:
                      accessModes:
                        - ReadWriteOnce
                      resources:
                        requests:
                          storage: 2Gi
            kubeEtcd:
              enabled: false
            kubeControllerManager:
              enabled: false
            kubeScheduler:
              enabled: false
            kubeProxy:
              enabled: false
        EOF
      changed_when: true

    - name: "Monitoring: Дождаться готовности operator"
      ansible.builtin.shell: |
        k3s kubectl -n monitoring rollout status deploy/kube-prometheus-stack-operator --timeout=300s
      retries: 6
      delay: 20
      register: prometheus_operator_ready
      until: prometheus_operator_ready.rc == 0

    - name: "Monitoring: Дождаться готовности Grafana"
      ansible.builtin.shell: |
        k3s kubectl -n monitoring rollout status deploy/kube-prometheus-stack-grafana --timeout=300s
      retries: 6
      delay: 20
      register: grafana_ready
      until: grafana_ready.rc == 0

    - name: "Monitoring: Вывести доступ к Grafana"
      ansible.builtin.debug:
        msg: >-
          Grafana доступна: kubectl -n monitoring port-forward svc/kube-prometheus-stack-grafana 3000:80
          Логин: admin / admin

    # === Итоговый статус ===

    - name: Вывести итоговый статус
      ansible.builtin.shell: |
        echo "=== CERT-MANAGER PODS ===" && k3s kubectl get pods -n cert-manager && \
        echo "=== CLUSTER ISSUERS ===" && k3s kubectl get clusterissuer && \
        echo "=== MONITORING PODS ===" && k3s kubectl get pods -n monitoring && \
        echo "=== MONITORING PVC ===" && k3s kubectl get pvc -n monitoring
      register: final_status
      changed_when: false

    - name: Итоговый статус
      ansible.builtin.debug:
        msg: "{{ final_status.stdout_lines }}"
