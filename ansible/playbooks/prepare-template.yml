---
# Создание cloud-init шаблона Ubuntu 24.04 на Proxmox
# Запуск: ansible-playbook -i inventory/hosts.yml playbooks/prepare-template.yml
- name: Создать cloud-init шаблон на Proxmox
  hosts: pve
  gather_facts: false
  vars:
    template_vmid: 9000
    template_name: ubuntu-2404-cloudinit
    image_url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    image_path: /var/lib/vz/template/iso/noble-server-cloudimg-amd64.img
    storage: nvme-storage

  tasks:
    - name: Скачать Ubuntu 24.04 cloud image
      ansible.builtin.get_url:
        url: "{{ image_url }}"
        dest: "{{ image_path }}"
        mode: "0644"

    - name: Проверить, существует ли шаблон
      ansible.builtin.command: qm status {{ template_vmid }}
      register: template_exists
      failed_when: false
      changed_when: false

    - name: Создать VM для шаблона
      when: template_exists.rc != 0
      block:
        - name: Создать VM
          ansible.builtin.command: >
            qm create {{ template_vmid }}
            --name {{ template_name }}
            --memory 2048
            --cores 2
            --net0 virtio,bridge=vmbr2
            --scsihw virtio-scsi-single
            --agent enabled=1

        - name: Импортировать диск
          ansible.builtin.command: >
            qm set {{ template_vmid }}
            --scsi0 {{ storage }}:0,import-from={{ image_path }}

        - name: Настроить cloud-init диск
          ansible.builtin.command: >
            qm set {{ template_vmid }}
            --ide2 {{ storage }}:cloudinit

        - name: Настроить загрузку с диска
          ansible.builtin.command: >
            qm set {{ template_vmid }}
            --boot order=scsi0
            --serial0 socket
            --vga serial0

        - name: Конвертировать в шаблон
          ansible.builtin.command: qm template {{ template_vmid }}

    - name: Шаблон уже существует
      when: template_exists.rc == 0
      ansible.builtin.debug:
        msg: "Шаблон {{ template_vmid }} ({{ template_name }}) уже существует"
